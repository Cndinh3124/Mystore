version: '3.8'

services:

  web1:
    build: ./web1
    container_name: web1
    volumes:
      - ./web1/src:/var/www/html
    depends_on:
      - mysql
    networks:
      - app-network

  web2:
    build: ./web2
    container_name: web2
    volumes:
      - ./web2/src:/var/www/html
    depends_on:
      - mysql
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./web1/src:/var/www/web1
      - ./web2/src:/var/www/web2
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web1
      - web2
    networks:
      - app-network

  dns:
    image: jpillora/dnsmasq
    container_name: dns
    ports:
      - "53:53/udp"
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf
    restart: always
    networks:
      - app-network

networks:
  app-network:
